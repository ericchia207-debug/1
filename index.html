<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>台北天氣紀錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: rgba(232,234,240,0.45);
    --accent: #4a9eff;
    --accent2: #7dd3b0;
    --warm: #ffb347;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,158,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,158,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }

  /* Header */
  .header { margin-bottom: 48px; }
  .city-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .title {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .title strong { font-weight: 500; }
  .subtitle {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    margin-right: 6px;
    animation: blink 2s infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Metrics row */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .metric {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 20px 18px;
    position: relative;
    overflow: hidden;
  }
  .metric::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(74,158,255,0.3), transparent);
  }
  .metric-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .metric-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    line-height: 1;
  }
  .metric-value.accent { color: var(--accent); }
  .metric-value.warm { color: var(--warm); }
  .metric-value.green { color: var(--accent2); }
  .metric-unit { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

  /* Chart */
  .chart-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .range-tabs { display: flex; gap: 4px; }
  .tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active, .tab:hover {
    background: rgba(74,158,255,0.12);
    color: var(--accent);
    border-color: rgba(74,158,255,0.3);
  }
  .chart-wrap { position: relative; height: 220px; }

  /* Table */
  .table-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-card .card-header { padding: 20px 24px 0; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 10px 24px;
    text-align: left;
    border-bottom: 0.5px solid var(--border);
  }
  tbody td {
    padding: 12px 24px;
    font-size: 13px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  .mono { font-family: var(--mono); }
  .cond-badge {
    display: inline-block;
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(74,158,255,0.1);
    color: var(--accent);
    border: 0.5px solid rgba(74,158,255,0.2);
  }
  .cond-badge.rain { background: rgba(125,211,176,0.1); color: var(--accent2); border-color: rgba(125,211,176,0.2); }
  .cond-badge.cloud { background: rgba(255,255,255,0.05); color: var(--muted); border-color: var(--border); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .error-box {
    background: rgba(255,80,80,0.07);
    border: 0.5px solid rgba(255,80,80,0.2);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: #ff8080;
    margin-bottom: 24px;
    display: none;
  }

  @media (max-width: 600px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .title { font-size: 24px; }
    thead th, tbody td { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="city-label">25.033°N · 121.565°E</div>
    <h1 class="title">台北<strong>天氣紀錄</strong></h1>
    <p class="subtitle"><span class="live-dot"></span><span id="last-update">載入中...</span></p>
  </div>

  <div id="error-box" class="error-box"></div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">目前氣溫</div>
      <div class="metric-value accent" id="cur-temp">—</div>
      <div class="metric-unit">°C</div>
    </div>
    <div class="metric">
      <div class="metric-label">相對濕度</div>
      <div class="metric-value green" id="cur-humidity">—</div>
      <div class="metric-unit">%</div>
    </div>
    <div class="metric">
      <div class="metric-label">風速</div>
      <div class="metric-value" id="cur-wind">—</div>
      <div class="metric-unit">km/h</div>
    </div>
    <div class="metric">
      <div class="metric-label">天氣狀況</div>
      <div class="metric-value warm" id="cur-cond" style="font-size:15px; padding-top:6px;">—</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="card-header">
      <div class="card-title">溫度趨勢</div>
      <div class="range-tabs">
        <button class="tab active" onclick="setRange(24, this)">24h</button>
        <button class="tab" onclick="setRange(72, this)">3天</button>
        <button class="tab" onclick="setRange(168, this)">7天</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart" role="img" aria-label="台北氣溫趨勢折線圖">台北氣溫趨勢</canvas>
    </div>
  </div>

  <div class="table-card">
    <div class="card-header">
      <div class="card-title">最近紀錄</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>時間</th>
          <th>氣溫</th>
          <th>濕度</th>
          <th>風速</th>
          <th>狀況</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="5" class="empty">載入資料中...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
let allData = [];
let chartInstance = null;
let currentRange = 24;

const condBadgeClass = c => {
  if (!c) return '';
  if (c.includes('雨') || c.includes('雪')) return 'rain';
  if (c.includes('多雲') || c.includes('陰') || c.includes('霧')) return 'cloud';
  return '';
};

const condEmoji = c => {
  if (!c) return '—';
  if (c.includes('晴')) return '☀️ ' + c;
  if (c.includes('多雲')) return '⛅ ' + c;
  if (c.includes('陰')) return '☁️ ' + c;
  if (c.includes('雨')) return '🌧 ' + c;
  if (c.includes('雪')) return '❄️ ' + c;
  if (c.includes('霧')) return '🌫 ' + c;
  if (c.includes('雷')) return '⛈ ' + c;
  return c;
};

function formatTime(ts, short = false) {
  const d = new Date(ts);
  if (short) return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':00';
  return d.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit', timeZone:'Asia/Taipei' });
}

function setRange(hours, btn) {
  currentRange = hours;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function renderMetrics(latest) {
  document.getElementById('cur-temp').textContent = latest.temperature ?? '—';
  document.getElementById('cur-humidity').textContent = latest.humidity ?? '—';
  document.getElementById('cur-wind').textContent = latest.wind_speed ?? '—';
  document.getElementById('cur-cond').textContent = condEmoji(latest.condition);
  document.getElementById('last-update').textContent =
    '最後更新：' + formatTime(latest.timestamp);
}

function renderChart() {
  const slice = allData.slice(-currentRange);
  const labels = slice.map(r => formatTime(r.timestamp, true));
  const temps = slice.map(r => r.temperature);

  if (chartInstance) {
    chartInstance.data.labels = labels;
    chartInstance.data.datasets[0].data = temps;
    chartInstance.update('none');
    return;
  }

  chartInstance = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '氣溫 (°C)',
        data: temps,
        borderColor: '#4a9eff',
        backgroundColor: (ctx) => {
          const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 220);
          g.addColorStop(0, 'rgba(74,158,255,0.18)');
          g.addColorStop(1, 'rgba(74,158,255,0)');
          return g;
        },
        borderWidth: 1.5,
        pointRadius: 0,
        pointHoverRadius: 4,
        fill: true,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2030',
          borderColor: 'rgba(74,158,255,0.3)',
          borderWidth: 0.5,
          titleColor: 'rgba(232,234,240,0.5)',
          bodyColor: '#4a9eff',
          titleFont: { family: 'DM Mono', size: 10 },
          bodyFont: { family: 'DM Mono', size: 13 },
          callbacks: { label: ctx => ctx.parsed.y + ' °C' }
        }
      },
      scales: {
        x: {
          ticks: { color: 'rgba(232,234,240,0.3)', font: { family: 'DM Mono', size: 10 }, maxTicksLimit: 8, maxRotation: 0 },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { color: 'rgba(255,255,255,0.07)' }
        },
        y: {
          ticks: { color: 'rgba(232,234,240,0.3)', font: { family: 'DM Mono', size: 10 }, callback: v => v + '°' },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { color: 'rgba(255,255,255,0.07)' }
        }
      }
    }
  });
}

function renderTable() {
  const recent = [...allData].reverse().slice(0, 48);
  const tbody = document.getElementById('table-body');
  if (!recent.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">尚無資料</td></tr>';
    return;
  }
  tbody.innerHTML = recent.map(r => `
    <tr>
      <td class="mono" style="color:rgba(232,234,240,0.6)">${formatTime(r.timestamp)}</td>
      <td class="mono" style="color:#4a9eff">${r.temperature}°C</td>
      <td class="mono">${r.humidity ?? '—'}%</td>
      <td class="mono">${r.wind_speed ?? '—'} km/h</td>
      <td><span class="cond-badge ${condBadgeClass(r.condition)}">${r.condition ?? '—'}</span></td>
    </tr>
  `).join('');
}

async function loadData() {
  try {
    const res = await fetch('./data/history.json?t=' + Date.now());
    if (!res.ok) throw new Error('無法讀取 data/history.json（HTTP ' + res.status + '）');
    allData = await res.json();
    if (!allData.length) throw new Error('資料檔為空');

    renderMetrics(allData[allData.length - 1]);
    renderChart();
    renderTable();
  } catch (err) {
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    box.textContent = '⚠ ' + err.message + ' — 請確認 GitHub Actions 已成功執行一次';
    document.getElementById('last-update').textContent = '無法取得資料';
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000); // 每5分鐘重新載入一次
</script>
</body>
</html>
